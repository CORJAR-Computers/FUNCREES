server {
    listen 80;
    server_name funcreescolombia.org www.funcreescolombia.org api.funcreescolombia.org;

    # ==========================================
    # REDIRECCIÓN A HTTPS (Se habilitará luego con Certbot)
    # ==========================================
    # return 301 https://$host$request_uri;

    # ==========================================
    # FRONTEND (SPA)
    # ==========================================
    # Para servir los archivos de la página web directamente
    location / {
        root /var/www/funcrees/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # BACKEND (Django API & Admin)
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # STATIC FILES (Django Admin / WhiteNoise)
    # ==========================================
    location /static/ {
        alias /var/www/funcrees/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ==========================================
    # LOGS
    # ==========================================
    access_log /var/log/nginx/funcrees_access.log;
    error_log /var/log/nginx/funcrees_error.log;
}
