<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Fundación Funcrees Colombia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8faf5;
            color: #1a2e3a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .error-container { max-width: 500px; }
        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 8rem;
            font-weight: 800;
            color: #578c57;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0.3;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: #1a2e3a;
            margin-bottom: 1rem;
        }
        p {
            color: #64748b;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            background: #578c57;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #2d502d; transform: translateY(-2px); }
        .leaf { color: #578c57; font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="leaf">🌿</div>
        <div class="error-code">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o ha sido movida. En la Fundación Funcrees Colombia seguimos trabajando para construir esperanza.</p>
        <a href="/" class="btn">← Volver al inicio</a>
    </div>
</body>
</html>
